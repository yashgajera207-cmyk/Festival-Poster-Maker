type Category {
  id: ID!
  name: String!
  slug: String!
}

input CreateCategoryInput {
  name: String!
  slug: String!
}

input UpdateCategoryInput {
  id: ID!
  name: String!
  slug: String!
}

extend type Query {
  categories: [Category!]!
}

extend type Mutation {
  createCategory(
    input: CreateCategoryInput!
  ): Category!

  updateCategory(
    input: UpdateCategoryInput!
  ): Category!

  deleteCategory(
    id: ID!
  ): Boolean!
}